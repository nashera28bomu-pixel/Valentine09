services:
  - type: web
    name: cymor-moviebox-wrapper
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MOVIEBOX_ORIGIN
        value: https://h5.aoneroom.com
      - key: PYTHON_VERSION
        value: 3.11.9
